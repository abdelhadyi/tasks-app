server {
    listen       80;
    server_name  _;

    # Serve the React build output
    root   /usr/share/nginx/html;
    index  index.html;

    # -----------------------------------------------------------------------
    # Static asset caching
    # Long-lived cache for hashed filenames generated by `react-scripts build`
    # -----------------------------------------------------------------------
    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # -----------------------------------------------------------------------
    # React Router fallback
    # All non-file requests are served index.html so client-side routing works.
    # /api/* paths are intentionally NOT handled here — the Kubernetes Ingress
    # Controller is responsible for routing those to the correct backend service.
    # -----------------------------------------------------------------------
    location / {
        try_files $uri /index.html;
    }
}
